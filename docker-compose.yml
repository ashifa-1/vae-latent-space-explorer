version: "3.9"

services:
  app:
    build: .
    container_name: vae-latent-space-explorer

    ports:
      - "${STREAMLIT_PORT:-8501}:8501"

    env_file:
      - .env

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    restart: unless-stopped